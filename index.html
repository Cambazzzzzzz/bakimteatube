<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeaTube - Bakımda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0003, #4a0007, #0f0002);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(61, 5, 5, 0.3));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .author {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            position: relative;
            display: inline-block;
        }

        .author::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 25%;
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="teatube.png" alt="TeaTube Logo" class="logo">
        <h1>TeaTube bakımda, sizlerle çok yakında!</h1>
        <div class="author">İsmail DEMİRCAN</div>
    </div>

</body>
</html>
