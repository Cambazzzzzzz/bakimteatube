<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakımdayız</title>
    
    <script>
        if (window.location.hostname.startsWith("www.")) {
            window.location.href = window.location.href.replace("www.", "");
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #290105, #52020a, #0f0102, #140002);
            background-size: 600% 600%;
            animation: gradientBG 8s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo {
            max-width: 260px;
            height: auto;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.6));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .countdown {
            font-size: 1.6rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        }

        .author {
            font-size: 1.15rem;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="teatube.png" alt="TeaTube Logo" class="logo">
        
        <h1>TeaTube bakımda, sizlerle çok yakında!</h1>
        <div class="countdown">Bakım bitiş süresi 27.06.2026 - 16:00 </div>
        
        <div class="author">İsmail DEMİRCAN</div>
        <div class="loader"></div>
    </div>

</body>
</html>
